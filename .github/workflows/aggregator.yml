name: Information Aggregator
on:
  schedule:
    # 北京时间每天上午 9 点运行 (UTC 1:00)
    - cron: '0 1 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-aggregator:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests feedparser praw

      - name: Fetch and Aggregate Data
        env:
          REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          AI_BASE_URL: ${{ secrets.AI_BASE_URL }}
          AI_MODEL_NAME: ${{ secrets.AI_MODEL_NAME }}
        run: |
          python scripts/fetch_data.py

      - name: Commit and Push Static Data
        run: |
          git config --local user.email "aggregator-bot@github.com"
          git config --local user.name "Aggregator Bot"
          git add public/data/
          git commit -m "chore: daily information aggregation and ai summary [skip ci]" || echo "No changes"
          git pull --rebase origin main
          git push origin main
