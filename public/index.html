<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InfoSou - 专业情报控制台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(12px); }
        .waterfall { column-gap: 1.5rem; }
        .waterfall-item { break-inside: avoid; margin-bottom: 1.5rem; }
        .sidebar-active { background-color: #4f46e5; color: white !important; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen font-sans text-slate-900">
    <div class="flex flex-col md:flex-row min-h-screen">
        <!-- Sidebar -->
        <aside class="w-full md:w-64 glass border-r border-slate-200 sticky top-0 h-auto md:h-screen p-6 flex flex-col z-50">
            <h1 class="text-2xl font-bold bg-gradient-to-r from-indigo-600 to-violet-600 bg-clip-text text-transparent mb-8">InfoSou</h1>
            
            <nav id="source-filter" class="flex-1 space-y-1">
                <button onclick="filterBySource('all')" class="w-full text-left px-4 py-2 rounded-lg text-slate-600 hover:bg-slate-100 transition-all sidebar-active" data-source="all">全部来源</button>
                <!-- 动态注入来源 -->
            </nav>

            <div class="mt-auto pt-6 border-t border-slate-100 flex gap-2">
                <button onclick="toggleSettings()" class="flex-1 text-xs py-2 px-3 bg-slate-100 hover:bg-slate-200 rounded-lg transition-all text-slate-600 flex items-center justify-center gap-1">⚙️ 系统设置</button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 p-4 md:p-8 lg:p-12 overflow-x-hidden">
            <!-- AI Summary Section -->
            <section id="ai-section" class="mb-10 hidden">
                <div class="bg-gradient-to-br from-indigo-600 to-violet-700 rounded-2xl p-px shadow-lg group">
                    <div class="bg-white/95 rounded-[15px] p-6 group-hover:bg-white/90 transition-all">
                        <div class="flex items-center justify-between mb-4">
                            <h2 class="font-bold text-indigo-900 flex items-center gap-2">
                                <span class="text-xl">✨</span> 今日情报摘要
                            </h2>
                            <button id="ai-btn" onclick="generateSummary()" class="text-xs bg-indigo-600 text-white px-4 py-1.5 rounded-full hover:bg-indigo-700 shadow-md shadow-indigo-200 transition-all">生成简报</button>
                        </div>
                        <div id="ai-content" class="text-slate-600 text-sm leading-relaxed whitespace-pre-wrap italic">点击按钮，让 AI 为您梳理当前的聚合情报...</div>
                    </div>
                </div>
            </section>

            <!-- Data List -->
            <div id="feed-container">
                <div id="loader" class="text-center py-20 text-slate-400 animate-pulse">正在链接情报网络...</div>
                <!-- 动态注入日期分组和内容 -->
            </div>
        </main>
    </div>

    <!-- Settings Modal -->
    <div id="settings-modal" class="fixed inset-0 bg-slate-900/40 backdrop-blur-sm hidden flex items-center justify-center z-[100] p-4">
        <div class="bg-white rounded-3xl p-8 w-full max-w-md shadow-2xl border border-slate-100">
            <h3 class="text-xl font-bold mb-6 text-slate-800">系统配置</h3>
            <div class="space-y-5">
                <div>
                    <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2">Gemini API Key</label>
                    <input type="password" id="api-key-input" class="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 focus:ring-2 focus:ring-indigo-500 outline-none transition-all" placeholder="粘贴秘钥...">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2">API 代理 (Base URL)</label>
                    <input type="text" id="api-base-input" class="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 focus:ring-2 focus:ring-indigo-500 outline-none transition-all" placeholder="https://generativelanguage.googleapis.com">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2">模型名称 (Model) </label>
                    <input type="text" id="api-model-input" class="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 focus:ring-2 focus:ring-indigo-500 outline-none transition-all" placeholder="gemini-1.5-flash">
                </div>
            </div>
            <div class="mt-8 flex gap-3">
                <button onclick="saveSettings()" class="bg-indigo-600 text-white font-bold px-6 py-3 rounded-xl flex-1 hover:bg-indigo-700 shadow-lg shadow-indigo-100 transition-all">确认保存</button>
                <button onclick="toggleSettings()" class="bg-slate-100 text-slate-500 px-6 py-3 rounded-xl hover:bg-slate-200 transition-all">取消</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { AIConfig } from './js/ai_manager.js';

        let rawData = [];
        let activeSource = 'all';

        async function init() {
            try {
                const res = await fetch('./data/latest.json?' + new Date().getTime());
                const json = await res.json();
                rawData = json.data || json.items || [];
                renderSidebar();
                renderContent();
                document.getElementById('ai-section').classList.remove('hidden');
            } catch (e) {
                document.getElementById('feed-container').innerHTML = `<div class="bg-red-50 text-red-500 p-6 rounded-2xl text-center">无法加载情报数据，请检查 latest.json 路径。</div>`;
            }
        }

        function renderSidebar() {
            const nav = document.getElementById('source-filter');
            const sources = [...new Set(rawData.map(i => i.source))];
            nav.innerHTML = `<button onclick="filterBySource('all')" class="w-full text-left px-4 py-2 rounded-lg transition-all ${activeSource==='all'?'sidebar-active':'text-slate-600 hover:bg-slate-100'}" data-source="all">全部来源</button>` + 
                sources.map(s => `
                    <button onclick="filterBySource('${s}')" class="w-full text-left px-4 py-2 rounded-lg transition-all ${activeSource===s?'sidebar-active':'text-slate-600 hover:bg-slate-100'}" data-source="${s}">${s}</button>
                `).join('');
        }

        window.filterBySource = (s) => {
            activeSource = s;
            renderSidebar();
            renderContent();
        }

        function renderContent() {
            const container = document.getElementById('feed-container');
            let filtered = activeSource === 'all' ? rawData : rawData.filter(i => i.source === activeSource);
            
            // 日期分组逻辑
            const groups = {};
            filtered.forEach(item => {
                const d = item.time ? new Date(item.time).toLocaleDateString() : '未知日期';
                if (!groups[d]) groups[d] = [];
                groups[d].push(item);
            });

            container.innerHTML = Object.keys(groups).sort((a,b) => new Date(b) - new Date(a)).map(date => `
                <div class="mb-12">
                    <h3 class="text-sm font-black text-slate-400 uppercase tracking-[0.2em] mb-6 flex items-center gap-3">
                        ${date} <span class="h-px flex-1 bg-slate-200"></span>
                    </h3>
                    <div class="waterfall columns-1 md:columns-2 lg:columns-3">
                        ${groups[date].map(item => `
                            <div class="waterfall-item">
                                <a href="${item.link}" target="_blank" class="block bg-white p-5 rounded-2xl border border-slate-100 shadow-sm hover:shadow-xl hover:-translate-y-1 transition-all duration-300 group">
                                    <div class="flex items-center gap-2 mb-3">
                                        <span class="text-[10px] font-bold px-2 py-0.5 rounded bg-slate-100 text-slate-500 uppercase">${item.source}</span>
                                        <span class="text-[10px] text-slate-300 ml-auto">${new Date(item.time).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</span>
                                    </div>
                                    <h4 class="text-slate-800 font-bold leading-snug group-hover:text-indigo-600 transition-colors">${item.title}</h4>
                                </a>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `).join('') || '<div class="text-slate-400 text-center py-20 italic">该来源下暂无情报...</div>';
        }

        window.toggleSettings = () => {
            const modal = document.getElementById('settings-modal');
            modal.classList.toggle('hidden');
            if (!modal.classList.contains('hidden')) {
                const settings = AIConfig.getSettings();
                document.getElementById('api-key-input').value = settings.apiKey || '';
                document.getElementById('api-base-input').value = settings.apiBase || 'https://generativelanguage.googleapis.com';
                document.getElementById('api-model-input').value = settings.model || 'gemini-1.5-flash';
            }
        };

        window.saveSettings = () => {
            const key = document.getElementById('api-key-input').value;
            let base = document.getElementById('api-base-input').value.trim();
            let model = document.getElementById('api-model-input').value.trim();
            if (!base) base = 'https://generativelanguage.googleapis.com';
            if (!model) model = 'gemini-1.5-flash';
            
            AIConfig.saveSettings({ apiKey: key, apiBase: base, model: model });
            toggleSettings();
            alert("✅ 系统配置已更新");
        };

        window.generateSummary = async () => {
            const btn = document.getElementById('ai-btn');
            const content = document.getElementById('ai-content');
            try {
                btn.disabled = true;
                btn.innerText = "正在解密情报...";
                content.innerText = "AI 正在快速阅读当前分类下的所有情报，请耐心等待...";
                const result = await AIConfig.summarizeDaily(rawData.slice(0, 50)); // 喂前50条
                content.innerText = result;
            } catch (e) {
                content.innerText = "❌ 解析失败：" + e.message;
            } finally {
                btn.disabled = false;
                btn.innerText = "生成简报";
            }
        };

        init();
    </script>
</body>
</html>
