<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no font-white">
    <title>InfoSou - Nexus Intelligence Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = { theme: { extend: { colors: { nexus: { bg: '#1c1917', sidebar: '#44403c', accent: '#fbbf24' } } } } }
    </script>
    <style>
        body {
            background: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E"),
                linear-gradient(135deg, #1c1917 0%, #292524 20%, #44403c 40%, #78350f 60%, #451a03 80%, #1c1917 100%);
            background-attachment: fixed; color: #ffffff; font-family: 'Noto Sans SC', sans-serif; overflow-x: hidden;
        }
        .sidebar { background-color: #44403c; border-right: 1px solid rgba(0,0,0,0.3); width: 14rem; display: flex; flex-direction: column; justify-content: center; height: 100vh; transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); z-index: 50; }
        @media (max-width: 768px) {
            .sidebar { position: fixed; transform: translateX(-100%); width: 85%; }
            .sidebar.open { transform: translateX(0); }
            .main-view.sidebar-open { opacity: 0.3; pointer-events: none; }
        }
        .nexus-card { background: rgba(41, 37, 36, 0.5); backdrop-filter: blur(8px); border: 1px solid rgba(120, 53, 15, 0.15); transition: all 0.3s ease; }
        .nexus-card:hover { border-color: rgba(251, 191, 36, 0.5); background: rgba(41, 37, 36, 0.7); transform: translateY(-3px); }

        .prose-nexus h3 { color: #fbbf24; font-weight: 800; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 0.5rem; margin-top: 1rem; margin-bottom: 0.5rem; font-size: 14px; }
        .prose-nexus b, .prose-nexus strong { color: #fbbf24; }

        /* 悬浮助手 3.0：彻底支持拖拽 & 精简 */
        .agent-window {
            position: fixed; bottom: 6rem; right: 2rem; width: 22rem; height: 30rem;
            background: rgba(30, 28, 25, 0.95); border: 1px solid rgba(251, 191, 36, 0.2);
            border-radius: 12px; flex-direction: column; display: none;
            box-shadow: 0 40px 100px rgba(0,0,0,0.9); overflow: hidden; backdrop-filter: blur(40px); z-index: 1000;
        }
        .agent-window.active { display: flex; animation: slideUp 0.2s ease-out; }
        .drag-bar { cursor: grab; background: rgba(251, 191, 36, 0.08); padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .drag-bar:active { cursor: grabbing; }

        .chat-area { flex: 1; overflow-y: auto; padding: 20px; }
        .chat-input-box { background: rgba(0,0,0,0.4); border-top: 1px solid rgba(255,255,255,0.05); padding: 15px; }
        .nexus-textarea {
            width: 100%; height: 3.5rem; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 6px; color: white; padding: 10px; font-size: 13px; outline: none; transition: all 0.2s; resize: none;
        }
        .nexus-textarea:focus { border-color: #fbbf24; background: rgba(255,255,255,0.06); }

        .agent-orb { position: fixed; bottom: 2rem; right: 2rem; width: 3.5rem; height: 3.5rem; background: #fbbf24; color: #000; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; box-shadow: 0 0 20px rgba(251, 191, 36, 0.4); z-index: 999; }

        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #701a06; }
    </style>
</head>
<body class="min-h-screen">
    <div class="flex flex-col md:flex-row min-h-screen overflow-hidden">
        <aside id="sidebar" class="sidebar">
            <div id="sidebar-scroll" class="w-full overflow-y-auto px-6 py-10 custom-scrollbar"><nav id="source-filter" class="space-y-1"></nav></div>
        </aside>

        <main id="main-view" class="flex-1 flex flex-col h-screen relative overflow-hidden bg-transparent">
            <div class="bg-[#44403c] border-b border-white/5 z-20 flex-shrink-0">
                <div class="px-4 md:px-8 py-3 flex items-center gap-2 text-[9px]">
                    <button onclick="window.toggleMenu(true)" class="md:hidden border border-amber-900/40 text-amber-500 px-3 py-1 rounded">MENU</button>
                    <button onclick="window.setDateFilter('today')" id="f-today" class="bg-black/20 text-white px-3 py-1 rounded border border-white/10 uppercase">Today</button>
                    <button onclick="window.setRecency('history')" id="f-history" class="bg-black/20 text-white px-3 py-1 rounded border border-white/10 uppercase ml-2 tracking-widest">History</button>
                    <button onclick="window.toggleSettings(true)" class="ml-auto opacity-50 hover:opacity-100 text-amber-500 px-3 py-1 uppercase">⚙ Settings</button>
                </div>
            </div>

            <div class="flex-1 overflow-y-auto" id="main-scroll">
                <div class="p-6 lg:p-14">
                    <section id="ai-section" class="mb-14">
                        <div class="p-8 rounded-xl border border-amber-900/20 bg-[#44403c]/30 backdrop-blur-md relative overflow-hidden group">
                           <div class="text-amber-400 font-black text-[10px] tracking-widest uppercase mb-4 opacity-40">§ Intelligence_Report</div>
                           <div id="ai-content" class="text-white text-[14.5px] leading-relaxed font-normal space-y-4">STANDBY...</div>
                        </div>
                    </section>
                    <div id="feed-container"></div>
                </div>
            </div>
        </main>
    </div>

    <!-- 悬浮智能助手 3.0 -->
    <div id="agent-window" class="agent-window">
         <div id="agent-drag-handle" class="drag-bar flex items-center justify-between">
            <div class="flex items-center gap-2">
                <div class="w-1.5 h-1.5 rounded-full bg-amber-500 animate-pulse"></div>
                <span class="text-[9px] font-black text-amber-500 tracking-[0.4em] uppercase select-none">Nexus_Insight</span>
            </div>
            <button onclick="window.toggleAgent(false)" class="text-white opacity-20 hover:opacity-100">✕</button>
         </div>
         <div id="chat-history" class="chat-area space-y-6 custom-scrollbar"></div>
         <div class="chat-input-box">
            <textarea id="chat-input" class="nexus-textarea custom-scrollbar" placeholder="输入指令并按 Enter 提交..."></textarea>
         </div>
    </div>
    <div class="agent-orb shadow-xl hover:scale-110 transition-transform" onclick="window.toggleAgent()">
        <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3"><path d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/></svg>
    </div>

    <script type="module" src="./js/app-nexus.js"></script>
</body>
</html>
